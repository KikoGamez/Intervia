<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Ayuda - intervia ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #111827; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 24px; padding: 48px; max-width: 560px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06); border: 1px solid #f3f4f6; }
  .icon { width: 64px; height: 64px; background: rgba(115,80,255,0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
  .icon svg { width: 32px; height: 32px; color: #7350ff; }
  h1 { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 700; margin-bottom: 16px; }
  .highlight { background: linear-gradient(135deg, #7350ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
  p { font-size: 16px; color: #6b7280; line-height: 1.7; margin-bottom: 24px; }
  .back { display: inline-flex; align-items: center; gap: 8px; color: #7350ff; font-weight: 600; text-decoration: none; font-size: 14px; transition: opacity 0.3s; }
  .back:hover { opacity: 0.7; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  </div>
  <h1>Centro de <span class="highlight">Ayuda</span></h1>
  <p>Proximamente tendras un centro de ayuda para resolver tus dudas y enviarnos sugerencias. Estamos trabajando en ello.</p>
  <p>Gracias por tu paciencia.</p>
  <a href="./" class="back">&larr; Volver a intervia ai</a>
</div>
</body>
</html>
